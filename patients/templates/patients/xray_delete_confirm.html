{% extends "base.html" %}

{% block title %}Delete X-Ray{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 m-0">Delete X-Ray</h1>
        <a href="{% url 'patient_detail' xray.patient.pk %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back to Patient
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <p>Are you sure you want to delete this X-Ray?</p>
            
            <div class="alert alert-secondary">
                <strong>Patient:</strong> {{ xray.patient.name }}<br>
                <strong>Date Added:</strong> {{ xray.date_added|date:"M d, Y" }}
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mt-4 d-flex gap-2">
                    <button class="btn btn-danger" type="submit">
                        <i class="bi bi-trash"></i> Delete X-Ray
                    </button>
                    <a href="{% url 'patient_detail' xray.patient.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
